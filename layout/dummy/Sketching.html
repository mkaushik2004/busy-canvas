<style>
    body{
        background-image: url(../assets/img/banner/3.jpg);
        background-repeat: no-repeat;
        background-size: cover;

    }
    .title
    {
        text-align: center;
    }
    .title-btn{
        background-color: #6778E7;
        color: white;
        padding: 15px;
        font-family: 'Courier New', Courier, monospace;
        border-radius:10px;
        border: 2px solid white;
        font-size: 18px;
    }

    .gallery{
        display: flex;
        gap: 1rem;
        height: 50%;
        width: 100%;
    }

    .gallery > div{
        flex: 1;
        transition: all 1s;
    }
    .gallery > div:nth-child(1){
        background: url("../assets/img/gallery/6.png");
        background-position: center;
        background-size: cover;
    }
    .gallery > div:nth-child(2){
        background: url("../assets/img/gallery/2.png");
        background-position: center;
        background-size: cover;
        
    }
    .gallery > div:nth-child(3){
        background: url("../assets/img/gallery/3.png");
        background-position: center;
        background-size: cover;
    }
    .gallery > div:nth-child(4){
        background: url("../assets/img/gallery/4.png");
        background-position: center;
        background-size: cover;
    }
    .gallery > div:nth-child(5){
        background: url("../assets/img/gallery/1.png");
        background-position: center;
        background-size: cover;
    }

    .gallery > div:hover{
        flex: 1.5;
    }

    .down-btn{
    all: unset;
    border: 3px ridge ;
    padding: 10px;
    border-radius: 10px;
    background-image:url(../assets/img/background/2.jpg);
    font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
    font-weight:bold;
    cursor: pointer;
    }

</style>

<body>
    <div class="title">
        <br><br>
        <button class="title-btn">ART GALLERY</button>
    </div>
    <br><br>
    <div class="gallery">
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
    </div>

    <br><br><br>
    <br><br><br>
    
    <div class="title">
        <a href="" class="down-btn" >Make a art for your Loved ones </a>
    </div>
</body>
