<style>
    .header{
        color: aliceblue;
        background-color: black;
        justify-content: space-between;
        display:flex;
        padding: 5px;
        align-items: center;
        
    }
    .profile
    {
        height: 40px;
        width: 40px;
        border-radius: 50%;
        margin-left: 25px;
        cursor: pointer;
        
    }

    .title{
        font-family: sans-serif;
        font: size 20px;
    }
    .dropdown{
        display: none ;
        position: absolute;
        background-color: grey;
        text-decoration: none;
        height: auto;
        width: auto;
        padding: 5px 10px;
        text-align: center;
    }
    .dropdown a{
        display: block;
        padding: 5px;
        text-decoration: none;
        color:black;
    }
    .profile:hover + .dropdown, 
        .dropdown:hover {
            display: block;
            position: relative;
        }

        .container {
            display: flex;
            width: 100%;
            height: 100%;
        }
        .section {
            flex: 1;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .section img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .overlay {
            position: absolute;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
        }
        .overlay button {
            color: white;
            background: black;
            border: 5px solid white;
            padding: 20px;
            font-size: 24px;
            cursor: pointer;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
</style>
<div>

    <div class="header">    
         <p class="title">Welcome to the World of Busy Canvas</p>
         <div>

             <img class="profile" src="../assets/img/header/profile.png" alt="loading...">
             <div class="dropdown">
                    <a href="#">Profile</a>
                    <a href="#">Logout</a>
            </div>
        </div>
     </div>

     <div class="container">
        <div class="section">
            <img src="../assets/img/banner/1.jpg" alt="Sketching">
            <div class="overlay">
                <button onclick="window.location.href='#'">< Sketching</button>
            </div>
        </div>
        <div class="section">
            <img src="../assets/img/banner/2.jpg" alt="Training">
            <div class="overlay">
                <button onclick="window.location.href='#'">Training ></button>
            </div>
        </div>
    </div>

</div>
